name: Deploy Next VPS

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web-next/**"
      - ".github/workflows/deploy-next.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing one or more required secrets: VPS_HOST, VPS_SSH_KEY"
            exit 1
          fi

      - name: Prepare SSH private key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          KEY_CONTENT="${VPS_SSH_KEY//$'\r'/}"

          if [[ "$KEY_CONTENT" == *"BEGIN "*" PRIVATE KEY"* ]]; then
            printf '%b' "${KEY_CONTENT//\\n/$'\n'}" > ~/.ssh/grindctrl_vps_key
          else
            printf '%s' "$KEY_CONTENT" | base64 -d > ~/.ssh/grindctrl_vps_key
          fi

          chmod 600 ~/.ssh/grindctrl_vps_key

          if ! ssh-keygen -yf ~/.ssh/grindctrl_vps_key > /dev/null 2>&1; then
            echo "VPS_SSH_KEY is not a valid private key (raw or base64)."
            exit 1
          fi

      - name: Deploy Next app over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || secrets.VPS_USERNAME || 'root' }}
          key_path: ~/.ssh/grindctrl_vps_key
          script: /root/grindctrl-next/deploy-next.sh
