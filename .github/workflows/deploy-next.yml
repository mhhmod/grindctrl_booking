name: Deploy Next VPS

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web-next/**"
      - ".github/workflows/deploy-next.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing one or more required secrets: VPS_HOST, VPS_SSH_KEY"
            exit 1
          fi

      - name: Prepare SSH private key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          KEY_CONTENT="${VPS_SSH_KEY//$'\r'/}"

          if [[ "$KEY_CONTENT" == *"BEGIN "*" PRIVATE KEY"* ]]; then
            printf '%b' "${KEY_CONTENT//\\n/$'\n'}" > ~/.ssh/grindctrl_vps_key
          else
            if printf '%s' "$KEY_CONTENT" | base64 -d > ~/.ssh/grindctrl_vps_key 2>/dev/null; then
              true
            else
              printf '%b' "${KEY_CONTENT//\\n/$'\n'}" > ~/.ssh/grindctrl_vps_key
            fi
          fi

          chmod 600 ~/.ssh/grindctrl_vps_key

      - name: Deploy Next app over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || secrets.VPS_USERNAME || 'root' }}
          key_path: /home/runner/.ssh/grindctrl_vps_key
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || secrets.VPS_PASSPHRASE }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            REPO_DIR="/root/grindctrl-next"
            if [ ! -d "$REPO_DIR" ]; then
              echo "Server repo directory not found: $REPO_DIR"
              exit 1
            fi

            cd "$REPO_DIR"
            TOP_LEVEL="$(git rev-parse --show-toplevel)"
            echo "Using server repo: $TOP_LEVEL"

            if [ -n "$(git -C "$TOP_LEVEL" status --porcelain)" ]; then
              STASH_NAME="auto-predeploy-$(date -u +%Y%m%dT%H%M%SZ)"
              git -C "$TOP_LEVEL" stash push -u -m "$STASH_NAME"
              echo "Stashed server local changes as $STASH_NAME"
            else
              echo "Server repo is already clean"
            fi

      - name: Run server deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || secrets.VPS_USERNAME || 'root' }}
          key_path: /home/runner/.ssh/grindctrl_vps_key
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || secrets.VPS_PASSPHRASE }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: /root/grindctrl-next/deploy-next.sh
