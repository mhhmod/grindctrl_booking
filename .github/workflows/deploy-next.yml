name: Deploy Next VPS

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web-next/**"
      - ".github/workflows/deploy-next.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing one or more required secrets: VPS_HOST, VPS_SSH_KEY"
            exit 1
          fi

      - name: Prepare SSH private key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          KEY_CONTENT="${VPS_SSH_KEY//$'\r'/}"

          if [[ "$KEY_CONTENT" == *"BEGIN "*" PRIVATE KEY"* ]]; then
            printf '%b' "${KEY_CONTENT//\\n/$'\n'}" > ~/.ssh/grindctrl_vps_key
          else
            if printf '%s' "$KEY_CONTENT" | base64 -d > ~/.ssh/grindctrl_vps_key 2>/dev/null; then
              true
            else
              printf '%b' "${KEY_CONTENT//\\n/$'\n'}" > ~/.ssh/grindctrl_vps_key
            fi
          fi

          chmod 600 ~/.ssh/grindctrl_vps_key

      - name: Deploy Next app over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || secrets.VPS_USERNAME || 'root' }}
          key_path: /home/runner/.ssh/grindctrl_vps_key
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || secrets.VPS_PASSPHRASE }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            DEPLOY_SCRIPT="/root/grindctrl-next/deploy-next.sh"

            if [ ! -f "$DEPLOY_SCRIPT" ]; then
              echo "Deploy script not found: $DEPLOY_SCRIPT"
              exit 1
            fi

            REPO_DIR=""

            SCRIPT_CD="$(awk '/^[[:space:]]*cd[[:space:]]+/{print $2; exit}' "$DEPLOY_SCRIPT" | tr -d '"' | tr -d "'")"
            if [ -n "$SCRIPT_CD" ] && [ -d "$SCRIPT_CD/.git" ]; then
              REPO_DIR="$SCRIPT_CD"
            fi

            if [ -z "$REPO_DIR" ] && [ -d "/root/grindctrl-booking/.git" ]; then
              REPO_DIR="/root/grindctrl-booking"
            fi

            if [ -z "$REPO_DIR" ] && [ -d "/root/grindctrl-next/.git" ]; then
              REPO_DIR="/root/grindctrl-next"
            fi

            if [ -z "$REPO_DIR" ]; then
              for ROOT in /root /home; do
                [ -d "$ROOT" ] || continue
                while IFS= read -r GIT_DIR; do
                  CANDIDATE="${GIT_DIR%/.git}"
                  ORIGIN_URL="$(git -C "$CANDIDATE" config --get remote.origin.url || true)"
                  case "$ORIGIN_URL" in
                    *mhhmod/grindctrl_booking* )
                      REPO_DIR="$CANDIDATE"
                      break 2
                      ;;
                  esac
                done < <(find "$ROOT" -maxdepth 6 -type d -name .git 2>/dev/null)
              done
            fi

            if [ -z "$REPO_DIR" ]; then
              echo "Could not detect deploy git repository on server"
              exit 1
            fi

            TOP_LEVEL="$(git -C "$REPO_DIR" rev-parse --show-toplevel)"
            echo "Using server repo: $TOP_LEVEL"

            if [ -n "$(git -C "$TOP_LEVEL" status --porcelain)" ]; then
              STASH_NAME="auto-predeploy-$(date -u +%Y%m%dT%H%M%SZ)"
              git -C "$TOP_LEVEL" stash push -u -m "$STASH_NAME"
              echo "Stashed server local changes as $STASH_NAME"
            else
              echo "Server repo is already clean"
            fi

      - name: Run server deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || secrets.VPS_USERNAME || 'root' }}
          key_path: /home/runner/.ssh/grindctrl_vps_key
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || secrets.VPS_PASSPHRASE }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: /root/grindctrl-next/deploy-next.sh
