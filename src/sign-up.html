<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — GRINDCTRL</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="gc-auth-page">
    <a href="/" class="gc-auth-back">
      <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
      Back to GRINDCTRL
    </a>

    <div class="gc-auth-header">
      <a href="/" class="gc-auth-brand">
        <div class="gc-auth-brand-icon">
          <span class="material-symbols-outlined" style="font-size:20px">smart_toy</span>
        </div>
        <span class="gc-auth-brand-text">GRINDCTRL</span>
      </a>
      <h1 class="gc-auth-title">Create your account</h1>
      <p class="gc-auth-subtitle">Get started with GRINDCTRL dashboard</p>
    </div>

    <div class="gc-auth-card">
      <div id="clerk-sign-up-mount" class="gc-auth-mount"></div>
    </div>

    <div class="gc-auth-footer">
      Already have an account? <a href="/sign-in.html">Sign in</a>
    </div>
  </div>

  <script type="module" src="/scripts/auth-sign-up.js"></script>
</body>
</html>
