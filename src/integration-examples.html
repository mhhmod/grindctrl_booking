<!-- ═══════════════════════════════════════════════════════
  EXAMPLE 1: Plain HTML Website — Queue Pattern (Recommended)
  Safe async bootstrap: config can be declared before script loads.
  Paste before </body> on every page.
═══════════════════════════════════════════════════════ -->
<script>
  window.GrindctrlSupport = window.GrindctrlSupport || [];
  window.GrindctrlSupport.push({
    embedKey: 'YOUR_EMBED_KEY',
    domain: window.location.hostname,
    // Optional overrides:
    // launcherLabel: 'Help',
    // launcherPosition: 'bottom-left',
    // greetingMessage: 'How can we help?',
    // showIntentButtons: true,
    // userEmail: 'user@example.com', // if logged in
    // userName: 'Jane Smith',
    // onEvent: function(name, data) { console.log('gc_event', name, data); },
    // onConversationStart: function(data) { console.log('conv_start', data); },
    // onReady: function(config) { console.log('widget_ready', config); },
  });
</script>
<script async src="https://cdn.grindctrl.com/grindctrl-support.js"></script>


<!-- ═══════════════════════════════════════════════════════
  EXAMPLE 1b: Plain HTML — Direct Init (Classic Pattern)
  Use this if you prefer synchronous initialization.
═══════════════════════════════════════════════════════ -->
<script src="https://cdn.grindctrl.com/grindctrl-support.js"></script>
<script>
  GrindctrlSupport.init({
    embedKey: 'YOUR_EMBED_KEY',
    domain: window.location.hostname,
  });
</script>

  EXAMPLE 2: React / Next.js
  Use as a component or in _app.js / layout.tsx
═══════════════════════════════════════════════════════ -->
<!--
  // Option A: Plain script tag in _app.tsx or layout.tsx
  // Add to the <head> or body:

  useEffect(() => {
    const script = document.createElement('script');
    script.src = 'https://cdn.grindctrl.com/grindctrl-support.js';
    script.async = true;
    document.body.appendChild(script);

    script.onload = () => {
      if (window.GrindctrlSupport) {
        window.GrindctrlSupport.init({
          embedKey: process.env.NEXT_PUBLIC_GRINDCTRL_KEY,
          domain: window.location.hostname,
        });
      }
    };

    return () => {
      document.body.removeChild(script);
    };
  }, []);


  // Option B: TypeScript component (grindctrl-widget.tsx)

  import { useEffect } from 'react';

  declare global {
    interface Window {
      GrindctrlSupport: any;
    }
  }

  interface GrindctrlWidgetProps {
    embedKey: string;
    userEmail?: string;
    userName?: string;
    greetingMessage?: string;
    onEvent?: (name: string, data: any) => void;
    onReady?: (config: any) => void;
  }

  export default function GrindctrlWidget({
    embedKey,
    userEmail,
    userName,
    greetingMessage,
    onEvent,
    onReady,
  }: GrindctrlWidgetProps) {
    useEffect(() => {
      // Load script if not already present
      if (!document.querySelector('script[src*="grindctrl-support"]')) {
        const script = document.createElement('script');
        script.src = 'https://cdn.grindctrl.com/grindctrl-support.js';
        script.async = true;
        document.body.appendChild(script);
        script.onload = initWidget;
      } else if (window.GrindctrlSupport) {
        initWidget();
      }

      function initWidget() {
        if (window.GrindctrlSupport) {
          window.GrindctrlSupport.init({
            embedKey,
            domain: window.location.hostname,
            userEmail,
            userName,
            greetingMessage,
            onEvent,
            onReady,
          });
        }
      }

      return () => {
        // Cleanup on unmount (optional)
        // window.GrindctrlSupport?.destroy?.();
      };
    }, [embedKey, userEmail, userName]);

    return null; // Renders in shadow DOM
  }


  // Usage in Next.js page:
  // <GrindctrlWidget
  //   embedKey={process.env.NEXT_PUBLIC_GRINDCTRL_KEY!}
  //   userEmail={session?.user?.email}
  //   userName={session?.user?.name}
  // />
-->

      <script>
          window.GrindctrlSupport = window.GrindctrlSupport || [];
          window.GrindctrlSupport.push(function(api) {

                  embedKey: 'YOUR_EMBED_KEY',
                  domain: window.location.hostname,

              });
          });
      </script>
      <?php

<!-- ═══════════════════════════════════════════════════════
  EXAMPLE 8: Lead Capture Configuration
  Collect visitor info before or during the conversation.
  Available leadCaptureMode options:
    - 'off' (default): No lead capture
    - 'before_first_message': Gate the chat until info is collected
    - 'after_intent': Show form after user clicks an intent button
    - 'after_2_messages': Show form after 2 messages
    - 'after_3_messages': Show form after 3 messages
═══════════════════════════════════════════════════════ -->
<!--
  // Full business intake (name, email, phone, company)
  window.GrindctrlSupport = window.GrindctrlSupport || [];
  window.GrindctrlSupport.push({
    embedKey: 'YOUR_EMBED_KEY',
    domain: window.location.hostname,
    leadCaptureMode: 'before_first_message',
    leadCaptureFields: ['name', 'email', 'phone', 'company'],
    leadCaptureTitle: 'Get a personalized demo',
    leadCaptureSubtitle: 'Tell us about your business',
  });

  // Lightweight capture (name + email only)
  window.GrindctrlSupport = window.GrindctrlSupport || [];
  window.GrindctrlSupport.push({
    embedKey: 'YOUR_EMBED_KEY',
    domain: window.location.hostname,
    leadCaptureMode: 'after_intent',
    leadCaptureFields: ['name', 'email'],
  });

  // Skippable form (user can bypass)
  window.GrindctrlSupport = window.GrindctrlSupport || [];
  window.GrindctrlSupport.push({
    embedKey: 'YOUR_EMBED_KEY',
    domain: window.location.hostname,
    leadCaptureMode: 'before_first_message',
    leadCaptureFields: ['name', 'email'],
    leadCaptureSkippable: true,
  });
-->
