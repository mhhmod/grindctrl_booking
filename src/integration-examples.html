<!--
  GRINDCTRL Support Widget — Integration Examples
  Version: 2.0.0

  Primary production install contract:
  1. Canonical queue + loader snippet (default)
  2. CSP-friendly attribute-based loader snippet (secondary official variant)

  Replace YOUR_EMBED_KEY with your real embed key from the dashboard.
-->

<!-- ═══════════════════════════════════════════════════════
  EXAMPLE 1: Plain HTML Website — Canonical Queue + Loader (Recommended)
  Paste before </body> on every page.
═══════════════════════════════════════════════════════ -->
<script>
  window.GrindctrlSupport = window.GrindctrlSupport || [];
  window.GrindctrlSupport.push({
    embedKey: 'YOUR_EMBED_KEY',
    user: {
      id: null,
      email: null,
      name: null,
    },
    context: {
      custom: {},
    },
  });
</script>
<script async src="https://cdn.grindctrl.com/widget/v1/loader.js"></script>


<!-- ═══════════════════════════════════════════════════════
  EXAMPLE 1b: Plain HTML — CSP-Friendly Official Variant
  Use this when inline scripts are restricted.
═══════════════════════════════════════════════════════ -->
<script
  async
  src="https://cdn.grindctrl.com/widget/v1/loader.js"
  data-gc-embed-key="YOUR_EMBED_KEY">
</script>


<!-- ═══════════════════════════════════════════════════════
  EXAMPLE 2: React / Next.js — Queue-First Loader
═══════════════════════════════════════════════════════ -->
<!--
  import { useEffect } from 'react';

  export function GrindctrlWidget({ embedKey, userEmail, userName }) {
    useEffect(() => {
      window.GrindctrlSupport = window.GrindctrlSupport || [];
      window.GrindctrlSupport.push({
        embedKey,
        user: {
          id: null,
          email: userEmail ?? null,
          name: userName ?? null,
        },
        context: {
          custom: {},
        },
      });

      if (!document.querySelector('script[src="https://cdn.grindctrl.com/widget/v1/loader.js"]')) {
        const script = document.createElement('script');
        script.src = 'https://cdn.grindctrl.com/widget/v1/loader.js';
        script.async = true;
        document.body.appendChild(script);
      }
    }, [embedKey, userEmail, userName]);

    return null;
  }
-->
